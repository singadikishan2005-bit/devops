---
- name: Deploy Maven Artifact
  hosts: localhost
  become: no   # since you removed sudo

  tasks:
   - name: Create deployment directory
    file:
       path: /tmp/deployment
       state: directory
    - name: Copy JAR file
      copy:
        src: "target/maven-example-1.0-SNAPSHOT.jar"
        dest: "/opt/deployment/maven-example-1.0-SNAPSHOT.jar"

    - name: Run application
      shell: nohup java -jar /opt/deployment/maven-example-1.0-SNAPSHOT.jar > /dev/null 2>&1 &
